name: Daily Streak

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  update-log:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update streak log
        run: |
          echo "Updated on $(date)" >> streak-log.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automated streak update" || exit 0
          git push
