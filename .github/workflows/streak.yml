name: Daily Streak

permissions:
  contents: write

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  update-log:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update streak log
        run: |
          echo "Updated on $(date '+%Y-%m-%d %H:%M:%S')" >> streak-log.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add streak-log.md
          git commit -m "Automated streak update" || exit 0
          git push
